<!DOCTYPE html>
<html>
<head>
    <title>Hello World Page</title>
    <style>
        body {
            background-color: #e6e6e6;
            font-family: "Times New Roman", serif;
        }

        .container {
            width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            box-shadow: 0 0 10px gray;
        }

        /* FIRST BOX */
        .box1 {
            background-color: #8fb3c1;
            border: 8px double red;
            padding: 15px;
            margin-bottom: 30px;
        }

        /* SECOND BOX */
        .box2 {
            background-color: yellow;
            border: 5px solid #3b82f6;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
        }

        /* THIRD BOX */
        .box3 {
            background-color: #3fa56b;
            border: 10px dotted gray;
            padding: 15px;
        }

        h1 {
            margin: 0;
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="box1">
        <h1>Hello World</h1>
    </div>

    <div class="box2">
        <h1>Hello World</h1>
    </div>

    <div class="box3">
        <h1>Hello World</h1>
    </div>

</div>

</body>
</html>
