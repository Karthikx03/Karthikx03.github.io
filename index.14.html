<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlap Shapes</title>
    <style>
        .container {
            position: relative;
            margin: 50px;
        }

        /* The Blue Rectangle */
        .rectangle {
            width: 200px;
            height: 150px;
            background-color: blue;
            border: 4px solid black;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* The Yellow Circle */
        .circle {
            width: 140px;
            height: 140px;
            background-color: yellow;
            border: 4px solid #e74c3c; /* Reddish border from image */
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 110px;
            z-index: 2; /* Ensures it stays on top */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rectangle"></div>
        <div class="circle"></div>
    </div>

</body>
</html>
