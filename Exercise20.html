<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table and Fixed Div</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    table {
      border-collapse: collapse;
      width: 400px;
    }

    th, td {
      border: 2px solid #333;
      padding: 16px;
      text-align: left;
      font-size: 22px;
    }

    th {
      background-color: #999;
      color: white;
    }

    tr:nth-child(2),
    tr:nth-child(4) {
      background-color: yellow;
    }

    .fixed-box {
      position: fixed;
      top: 40px;
      right: 40px;
      width: 180px;
      padding: 20px;
      border: 4px solid #76b900;
      background-color: white;
      font-size: 22px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

  <div class="fixed-box">
    This div<br />
    element has<br />
    position: fixed;
  </div>
</body>
</html>
