<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Image Styling Exercise</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    img {
      width: 33%;
      height: 300px;
      object-fit: cover;
    }

    /* Left image */
    .rounded {
      border-radius: 18px;
    }

    /* Middle image (circle, no distortion) */
    .circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
    }

    /* Right image (distorted) */
    .distorted {
      object-fit: fill;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Left: rounded corners -->
    <img src="https://picsum.photos/id/1015/600/400" class="rounded" />

    <!-- Middle: circle -->
    <img src="https://picsum.photos/id/1016/600/400" class="circle" />

    <!-- Right: distorted -->
    <img src="https://picsum.photos/id/1015/600/400" class="distorted" />

  </div>
</body>
</html>
