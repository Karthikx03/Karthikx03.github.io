<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circled Button Exercise</title>
  <style>
    :root {
      --button-border: #2f2f2f;
      --button-text: #2f2f2f;
      --button-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f6f6;
      font-family: Roboto, Arial, sans-serif;
      color: #2f2f2f;
    }

    .page {
      width: 496px;
      min-height: 260px;
      background: #ffffff;
      border: 1px solid #eaeaea;
      padding: 20px;
    }

    .toolbar {
      height: 35px;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .detail-button {
      height: 22px;
      min-width: 62px;
      padding: 0 18px;
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: var(--button-bg);
      color: var(--button-text);
      font: 400 13px/20px Roboto, Arial, sans-serif;
      text-align: center;
      cursor: pointer;
      appearance: none;
    }

    .detail-button:active {
      transform: translateY(1px);
    }

    .image-frame {
      width: 320px;
      height: 170px;
      margin: 0 auto;
      background: #ffe0b8;
      padding: 10px 26px;
    }

    .mock-image {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #f3b063 0%, #e48a51 42%, #9d5f37 43%, #d89b68 100%);
      border: 1px solid #d3a070;
      display: grid;
      place-items: center;
      color: #004bff;
      font: 400 13px Roboto, Arial, sans-serif;
    }

    .details {
      display: none;
      width: 320px;
      margin: 14px auto 0;
      padding: 10px;
      border: 1px solid #eaeaea;
      background: #ffffff;
      font: 400 13px/1.5 Roboto, Arial, sans-serif;
      color: #707070;
    }

    .details.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="toolbar">
      <button class="detail-button" id="detailButton" type="button">看資料</button>
    </div>

    <section class="image-frame" aria-label="preview image area">
      <div class="mock-image">Default<br />450x240</div>
    </section>

    <section class="details" id="details">
      <strong>詳細資訊</strong><br />
      圖片名稱：20171012_1.jpg<br />
      尺寸：450 × 240<br />
      按鈕：height 22px, radius 8px, border #2f2f2f, Roboto 13px
    </section>
  </main>

  <script>
    const button = document.getElementById('detailButton');
    const details = document.getElementById('details');

    button.addEventListener('click', () => {
      details.classList.toggle('is-visible');
    });
  </script>
</body>
</html>
