<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial;
    background: #5aa2d6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    width: 260px;
    background: #eee;
    border-radius: 12px;
    padding: 10px;
  }

  .box { margin: 6px 0; }

  .header {
    background: #a6ce39;
    height: 80px;
    border-radius: 6px;
  }

  .content {
    display: flex;
    gap: 6px;
  }

  .content div {
    background: #18aeb5;
    height: 80px;
    flex: 1;
  }

  .footer {
    display: flex;
    gap: 6px;
  }

  .footer div {
    background: #ccc;
    height: 40px;
    flex: 1;
  }

  /* DEFAULT (DESKTOP like right side) */
  .content {
    flex-direction: row;
  }

  /* MOBILE (left side when <480px) */
  @media (max-width: 480px) {
    .content {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="box header"></div>

  <div class="box content">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="box footer">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

</body>
</html>
