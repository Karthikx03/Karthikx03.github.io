<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Layout</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #55b7f0;
      padding: 22px;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 10px;
      padding: 14px;
    }

    .header {
      height: 145px;
      background: #b3df3e;
      margin-bottom: 8px;
    }

    .main {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .main div {
      flex: 1;
      height: 170px;
      background: #12bdc7;
    }

    .footer {
      display: flex;
      gap: 8px;
    }

    .footer div {
      flex: 1;
      height: 95px;
      background: #e8f0f2;
    }

    /* Phone layout: when viewport width is less than 480px */
    @media screen and (max-width: 479px) {
      body {
        padding: 18px;
      }

      .wrapper {
        max-width: 345px;
        padding: 12px;
      }

      .header {
        height: 110px;
      }

      .main {
        flex-direction: column;
        gap: 6px;
      }

      .main div {
        width: 100%;
        height: 64px;
      }

      .footer {
        flex-wrap: wrap;
        gap: 6px;
      }

      .footer div {
        flex: 0 0 calc(50% - 3px);
        height: 45px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header"></div>

    <div class="main">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <div class="footer">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</body>
</html>
