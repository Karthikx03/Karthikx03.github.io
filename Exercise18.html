<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Headings Layout</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: "Times New Roman", serif;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            background: #eee;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Heading 1 */
        .heading1 {
            font-size: 48px;
            font-weight: bold;
            border-top: 6px solid black;
            display: inline-block;
            padding-top: 10px;
        }

        /* Heading 2 */
        .heading2 {
            font-size: 36px;
            font-style: italic;
            border: 4px solid black;
            outline: 4px solid yellow;
            padding: 10px;
            margin: 30px 0;
        }

        /* Heading 3 */
        .heading3 {
            font-size: 28px;
            text-align: right;
            text-decoration: underline;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="heading1">This is heading 1</div>

    <div class="heading2">This is heading 2</div>

    <div class="heading3">This is heading 3</div>
</div>

</body>
</html>
